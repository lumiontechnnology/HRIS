version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lumion-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lumion_hris}
      TZ: UTC
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumion-network

  redis:
    image: redis:7-alpine
    container_name: lumion-redis-dev
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumion-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lumion-api-dev
    working_dir: /app
    command: /bin/sh -c "npm install -g pnpm && pnpm install && pnpm --filter @lumion/api dev"
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/lumion_hris}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lumion-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lumion-web-dev
    working_dir: /app
    command: /bin/sh -c "npm install -g pnpm && pnpm install && pnpm --filter @lumion/web dev"
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-key-change-in-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - lumion-network

networks:
  lumion-network:
    driver: bridge

volumes:
  postgres_data:
